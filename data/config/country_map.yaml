# Country → Continent mapping for WF5 Personal Newspaper (ADR-083).
#
# ISO 3166-1 alpha-2 country codes → one of 6 continents:
#   africa, asia, europe, north_america, south_america, oceania
#
# Also site_id → primary_country mapping for the 116 crawl sources
# (sources.yaml already has `region` + `language`; this adds country
# granularity without mutating sources.yaml).
#
# D-7 intentional duplication with src/insights/m5_geopolitical.py's
# country extraction — M5 extracts from article text (downstream),
# this file provides the crawl-origin ground truth (upstream).

