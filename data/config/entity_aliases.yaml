# Cross-lingual entity aliases for WF5 story triangulation (ADR-083 Fix-A).
#
# Problem (diagnosed on 2026-04-14 corpus): only 11/2219 clusters were
# triangulated because articles covering the same event in different
# languages use non-overlapping tokens ("Trump" vs "트럼프" vs "トランプ"
# vs "特朗普"). SimHash + token-Jaccard is blind to this.
#
# Solution: curated canonical-entity alias dictionary, merged into each
# article's entity set BEFORE clustering. The story_clusterer then sees
# overlapping canonical IDs and triangulates correctly.
#
# Structure:
#   each entity has a canonical_id (Wikidata-like, lowercase snake_case)
#   aliases: list of surface forms across languages
#   type: person | country | org | event | region
#
# Coverage priority: top-100 geopolitical + top-50 economic actors.
# Curated manually; not exhaustive — falls back gracefully to token
# matching for unlisted entities.

entities:

  # -------- World leaders (current + recent) --------
  - canonical_id: donald_trump
    type: person
    aliases: ["Trump", "Donald Trump", "트럼프", "도널드 트럼프",
              "トランプ", "ドナルド・トランプ", "特朗普", "Trumps",
              "DJT", "President Trump", "트럼프 대통령"]
  - canonical_id: xi_jinping
    type: person
    aliases: ["Xi Jinping", "Xi", "시진핑", "習近平", "习近平",
              "시 주석", "Xi Jinping", "President Xi"]
